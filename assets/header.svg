<svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Terminal header: Dushyant Garg — agent runtimes, local-first tools, developer tooling">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="160" fill="url(#bg)" rx="12" />

  <!-- Window chrome -->
  <circle cx="28" cy="28" r="7" fill="#ff5f57" />
  <circle cx="52" cy="28" r="7" fill="#febc2e" />
  <circle cx="76" cy="28" r="7" fill="#28c840" />

  <!-- Prompt block -->
  <text x="40" y="80" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="22" font-weight="600" fill="#7ee787" filter="url(#glow)">$ whoami</text>

  <text x="40" y="118" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="28" font-weight="700" fill="#e6edf3" filter="url(#glow)">Dushyant Garg</text>

  <text x="40" y="150" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" fill="#8b949e">agent runtimes · local-first tools · developer tooling</text>

  <!-- Cursor -->
  <rect x="525" y="104" width="12" height="22" fill="#7ee787" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite" />
  </rect>
</svg>
